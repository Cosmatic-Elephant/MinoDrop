<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDROP - 킥 커스터마이즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      font-family: monospace;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px;
    }

    #page-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font: 14px monospace;
      color: #888;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.12s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: #ccc; }
    .back-arrow {
      width: 16px;
      height: 16px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .page-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .page-breadcrumb {
      font: 12px monospace;
      color: #555;
      letter-spacing: 0.03em;
    }
    .page-title {
      font: bold 22px monospace;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .save-btn {
      margin-left: auto;
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .save-btn:hover { background: #357a52; border-color: #5abf7a; }

    .divider {
      height: 1px;
      background: #2a2a3e;
    }

    /* ── Content area ── */
    #content-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── Grid canvas ── */
    #kick-grid {
      border: 2px solid #333;
      display: block;
    }

    /* ── Table ── */
    #kick-table {
      border-collapse: collapse;
    }
    #kick-table td {
      width: 60px;
      height: 32px;
      border: 1px solid #2a2a3e;
      background: #16213e;
      font: 13px monospace;
      color: #ccc;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="page-col">

    <div class="page-header">
      <a class="back-btn" href="library_kick.html" title="킥 목록으로">
        <span class="back-arrow"></span>
        킥 목록
      </a>
      <div class="page-title-group">
        <span class="page-breadcrumb">킥 목록 / 킥 커스터마이즈</span>
        <span class="page-title">킥 커스터마이즈</span>
      </div>
      <button class="save-btn">저장하기</button>
    </div>

    <div class="divider"></div>

    <div id="content-area">

      <canvas id="kick-grid"></canvas>

      <table id="kick-table">
        <tbody>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>

    </div>

  </div>
  <script>
    const canvas = document.getElementById('kick-grid');
    const ctx = canvas.getContext('2d');
    const CELL = 30, N = 9;
    canvas.width  = N * CELL;
    canvas.height = N * CELL;

    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#1c1c1c';
    ctx.lineWidth = 1;
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
  </script>
</body>
</html>
