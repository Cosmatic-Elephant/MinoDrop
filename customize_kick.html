<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDROP - 킥 커스터마이즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      font-family: monospace;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px;
    }

    #page-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font: 14px monospace;
      color: #888;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.12s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: #ccc; }
    .back-arrow {
      width: 16px;
      height: 16px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .page-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .page-breadcrumb {
      font: 12px monospace;
      color: #555;
      letter-spacing: 0.03em;
    }
    .page-title {
      font: bold 22px monospace;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .save-btn {
      margin-left: auto;
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .save-btn:hover { background: #357a52; border-color: #5abf7a; }

    .divider {
      height: 1px;
      background: #2a2a3e;
    }

    /* ── Content area ── */
    #content-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── Editor row (grid + fields) ── */
    #editor-row {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    /* ── Section titles ── */
    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-title {
      font: bold 13px monospace;
      color: #aaa;
      letter-spacing: 0.06em;
    }

    /* ── Grid canvas ── */
    #kick-grid {
      border: 2px solid #333;
      display: block;
      flex-shrink: 0;
    }

    /* ── Fields column ── */
    #fields-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kick-input {
      width: 120px;
      padding: 6px 10px;
      font: 14px monospace;
      background: #222;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      outline: none;
      letter-spacing: 0.03em;
      transition: border-color 0.12s;
    }
    .kick-input:focus { border-color: #777; }
    .action-icon {
      width: 26px;
      height: 26px;
      cursor: pointer;
      filter: invert(1);
      opacity: 0.6;
      transition: opacity 0.12s;
      display: block;
      flex-shrink: 0;
    }
    .action-icon:hover { opacity: 1; }
    #add-row-btn {
      width: 100%;
      padding: 6px 10px;
      font: 13px monospace;
      color: #666;
      background: transparent;
      border: 1px dashed #444;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.12s, border-color 0.12s;
    }
    #add-row-btn:hover { color: #aaa; border-color: #666; }

    /* ── Combo row ── */
    #combo-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .combo-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .combo-label {
      font: bold 13px monospace;
      color: #aaa;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .combo-select {
      padding: 5px 8px;
      font: 13px monospace;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }
    .combo-select:focus { border-color: #777; }
    .combo-select:disabled { opacity: 0.4; cursor: default; }
    #add-mino-btn {
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #add-mino-btn:hover { background: #357a52; border-color: #5abf7a; }
    #add-mino-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Table ── */
    #table-wrapper {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }
    #kick-table {
      border-collapse: collapse;
    }
    #kick-table th, #kick-table td {
      width: 72px;
      height: 32px;
      border: 1px solid #2a2a3e;
      font: 13px monospace;
      text-align: center;
    }
    #kick-table th {
      background: #1e2a44;
      color: #88aadd;
      font-weight: bold;
      letter-spacing: 0.03em;
    }
    #kick-table td {
      background: #16213e;
      color: #ccc;
      padding: 0;
    }
    #kick-table td:first-child {
      background: #1e2a44;
      color: #88aadd;
      font-weight: bold;
    }
    /* 셀 인라인 편집 입력 */
    .cell-input {
      display: block;
      width: 100%;
      height: 100%;
      padding: 0 4px;
      font: 13px monospace;
      background: #0d1a30;
      color: #eee;
      border: 1px solid #4a6aa0;
      outline: none;
      text-align: center;
      box-sizing: border-box;
    }
    .cell-input.invalid {
      border-color: #c04040;
      background: #2a1515;
      color: #ff9999;
    }
    /* 4행 그룹 구분선 */
    #kick-table tbody tr:nth-child(4) td,
    #kick-table tbody tr:nth-child(8) td {
      border-bottom: 2px solid #2a2a3e;
    }
    #add-col-btn {
      width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font: bold 16px monospace;
      color: #666;
      background: transparent;
      border: 1px dashed #444;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
    }
    #add-col-btn:hover:not(:disabled) { color: #aaa; border-color: #666; }
    #add-col-btn:disabled { opacity: 0.3; cursor: default; }
    /* 호버 강조 */
    #kick-table th:hover,
    #kick-table td:hover {
      background: #2e4a80 !important;
    }
  </style>
</head>
<body>
  <div id="page-col">

    <div class="page-header">
      <a class="back-btn" href="library_kick.html" title="킥 목록으로">
        <span class="back-arrow"></span>
        킥 목록
      </a>
      <div class="page-title-group">
        <span class="page-breadcrumb">킥 목록 / 킥 커스터마이즈</span>
        <span class="page-title">킥 커스터마이즈</span>
      </div>
      <button class="save-btn">저장하기</button>
    </div>

    <div class="divider"></div>

    <div id="content-area">

      <div id="editor-row">
        <div class="panel-section">
          <span class="section-title">킥 테스트</span>
          <canvas id="kick-grid"></canvas>
        </div>
        <div class="panel-section">
          <span class="section-title">대응 미노</span>
          <div id="fields-col">
          <div class="field-row">
            <input class="kick-input" type="text">
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <div class="field-row">
            <input class="kick-input" type="text">
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <div class="field-row">
            <input class="kick-input" type="text">
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <div class="field-row">
            <input class="kick-input" type="text">
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <button id="add-row-btn">+ 새 행 추가</button>
        </div>
        </div>
      </div>

      <div id="combo-row">
        <div class="combo-group">
          <span class="combo-label">미노 팩</span>
          <select id="pack-select" class="combo-select"></select>
        </div>
        <div class="combo-group">
          <span class="combo-label">미노</span>
          <select id="mino-select" class="combo-select"></select>
        </div>
        <button id="add-mino-btn">추가하기</button>
      </div>

      <div id="table-wrapper">
        <table id="kick-table">
          <thead>
            <tr>
              <th></th>
              <th>offset 0</th>
              <th>offset 1</th>
              <th>offset 2</th>
              <th>offset 3</th>
              <th>offset 4</th>
            </tr>
          </thead>
          <tbody>
            <!-- 오른쪽 회전 (CW) -->
            <tr><td>0→R</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>R→2</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>2→L</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>L→0</td><td></td><td></td><td></td><td></td><td></td></tr>
            <!-- 왼쪽 회전 (CCW) -->
            <tr><td>0→L</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>L→2</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>2→R</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>R→0</td><td></td><td></td><td></td><td></td><td></td></tr>
            <!-- 180도 회전 -->
            <tr><td>0→2</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>R→L</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>2→0</td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>L→R</td><td></td><td></td><td></td><td></td><td></td></tr>
          </tbody>
        </table>
        <button id="add-col-btn" title="열 추가">+</button>
      </div>

    </div>

  </div>
  <script type="module" src="customize_kick.js"></script>
</body>
</html>
