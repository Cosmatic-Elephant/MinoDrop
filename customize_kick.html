<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDROP - 킥 커스터마이즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      font-family: monospace;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px;
    }

    #page-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font: 14px monospace;
      color: #888;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.12s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: #ccc; }
    .back-arrow {
      width: 16px;
      height: 16px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .page-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .page-breadcrumb {
      font: 12px monospace;
      color: #555;
      letter-spacing: 0.03em;
    }
    .page-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-title {
      font: bold 22px monospace;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .kick-rename-btn {
      width: 20px;
      height: 20px;
      cursor: pointer;
      filter: invert(1);
      opacity: 0.5;
      transition: opacity 0.12s;
      display: block;
      flex-shrink: 0;
    }
    .kick-rename-btn:hover { opacity: 1; }
    .save-btn {
      margin-left: auto;
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .save-btn:hover { background: #357a52; border-color: #5abf7a; }

    .divider {
      height: 1px;
      background: #2a2a3e;
    }

    /* ── Content area ── */
    #content-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ── Editor row (grid + fields) ── */
    #editor-row {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    /* ── Section titles ── */
    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .section-title {
      font: bold 13px monospace;
      color: #aaa;
      letter-spacing: 0.06em;
    }

    /* ── Grid canvas ── */
    #kick-grid {
      border: 2px solid #333;
      display: block;
      flex-shrink: 0;
    }

    /* ── Kick test tools ── */
    .icon-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .tool-icon {
      width: 32px;
      height: 32px;
      display: block;
      cursor: pointer;
      opacity: 0.75;
      filter: invert(1);
      border-radius: 5px;
    }
    .tool-icon.selected {
      opacity: 1;
      background: rgba(0,0,0,0.15);
      box-shadow: 0 0 0 2px #000;
    }
    #kick-action-undo, #kick-action-redo {
      opacity: 0.2;
      transition: opacity 0.15s;
    }
    #kick-action-undo.available, #kick-action-redo.available { opacity: 1; }

    /* ── Fields column ── */
    #fields-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kick-input {
      width: 120px;
      padding: 6px 10px;
      font: 14px monospace;
      background: #222;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      outline: none;
      letter-spacing: 0.03em;
      transition: border-color 0.12s;
    }
    .kick-input:focus { border-color: #777; }
    .action-icon {
      width: 26px;
      height: 26px;
      cursor: pointer;
      filter: invert(1);
      opacity: 0.6;
      transition: opacity 0.12s;
      display: block;
      flex-shrink: 0;
    }
    .action-icon:hover { opacity: 1; }
    #add-row-btn {
      width: 100%;
      padding: 6px 10px;
      font: 13px monospace;
      color: #666;
      background: transparent;
      border: 1px dashed #444;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.12s, border-color 0.12s;
    }
    #add-row-btn:hover { color: #aaa; border-color: #666; }

    /* ── Combo row ── */
    #combo-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .combo-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .combo-label {
      font: bold 13px monospace;
      color: #aaa;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .combo-select {
      padding: 5px 8px;
      font: 13px monospace;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }
    .combo-select:focus { border-color: #777; }
    .combo-select:disabled { opacity: 0.4; cursor: default; }
    #add-mino-btn {
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #add-mino-btn:hover { background: #357a52; border-color: #5abf7a; }
    #add-mino-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Kick status text ── */
    #kick-status-text {
      font: 12px monospace;
      color: #888;
      letter-spacing: 0.03em;
      min-height: 1.4em;
    }

    /* ── Mirror row ── */
    #mirror-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mirror-btn {
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .mirror-btn:hover { background: #357a52; border-color: #5abf7a; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      border-bottom: 1px solid #2a2a3e;
      align-self: stretch;
    }
    .tab {
      padding: 7px 16px;
      font: 13px monospace;
      color: #555;
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      letter-spacing: 0.03em;
      min-width: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tab:hover {
      color: #999;
      background: #16213e;
      border-color: #2a2a3e;
    }
    .tab.active {
      color: #fff;
      background: #1a1a2e;
      border-color: #2a2a3e;
      border-bottom-color: #1a1a2e;
      margin-bottom: -1px;
      cursor: default;
    }
    .tab-add-btn {
      padding: 4px 8px;
      font: bold 16px monospace;
      color: #555;
      background: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      align-self: center;
      margin-bottom: 6px;
      line-height: 1;
      transition: color 0.12s, background 0.12s;
    }
    .tab-add-btn:hover { color: #aaa; background: #16213e; }
    .tab-close-btn {
      font-size: 14px;
      opacity: 0.4;
      transition: opacity 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .tab:hover .tab-close-btn { opacity: 0.7; }
    .tab-close-btn:hover { opacity: 1 !important; color: #ff9999; }
    .tab-name-input {
      font: 13px monospace;
      background: transparent;
      color: #fff;
      border: none;
      border-bottom: 1px solid #6688cc;
      outline: none;
      padding: 0 2px;
      width: 80px;
      letter-spacing: 0.03em;
    }
    .tab-name-input.invalid {
      border-bottom-color: #c04040;
      color: #ff9999;
    }

    #table-section {
      display: flex;
      flex-direction: column;
      min-width: 500px;
    }

    /* ── Column delete bar ── */
    #col-delete-bar {
      display: table;
      border-collapse: collapse;
    }
    .col-del-cell {
      display: table-cell;
      width: 72px;
      height: 30px;
      text-align: center;
      vertical-align: middle;
    }
    .col-del-btn {
      font: bold 13px monospace;
      color: #555;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 3px;
      line-height: 1;
      transition: color 0.12s, background 0.12s;
    }
    .col-del-btn:hover { color: #ff8888; background: #3a1515; }

    /* ── Table ── */
    #table-col {
      display: flex;
      flex-direction: column;
    }
    #table-wrapper {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }
    #kick-table {
      border-collapse: collapse;
      align-self: flex-start;
    }
    #kick-table th, #kick-table td {
      width: 72px;
      height: 32px;
      border: 1px solid #2a2a3e;
      font: 13px monospace;
      text-align: center;
    }
    #kick-table th {
      background: #1e2a44;
      color: #88aadd;
      font-weight: bold;
      letter-spacing: 0.03em;
    }
    #kick-table td {
      background: #16213e;
      color: #ccc;
      padding: 0;
    }
    #kick-table td:first-child {
      background: #1e2a44;
      color: #88aadd;
      font-weight: bold;
    }
    /* 셀 인라인 편집 입력 */
    .cell-input {
      display: block;
      width: 100%;
      height: 100%;
      padding: 0 4px;
      font: 13px monospace;
      background: #0d1a30;
      color: #eee;
      border: 1px solid #4a6aa0;
      outline: none;
      text-align: center;
      box-sizing: border-box;
    }
    .cell-input.invalid {
      border-color: #c04040;
      background: #2a1515;
      color: #ff9999;
    }
    /* 4행 그룹 구분선 */
    #kick-table tbody tr:nth-child(4) td,
    #kick-table tbody tr:nth-child(8) td {
      border-bottom: 2px solid #2a2a3e;
    }
    #add-col-btn {
      width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font: bold 16px monospace;
      color: #666;
      background: transparent;
      border: 1px dashed #444;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.12s, border-color 0.12s;
    }
    #add-col-btn:hover:not(:disabled) { color: #aaa; border-color: #666; }
    #add-col-btn:disabled { opacity: 0.3; cursor: default; }
    /* 호버 강조 */
    #kick-table th:hover,
    #kick-table td:hover,
    #kick-table .cell-highlight {
      background: #2e4a80 !important;
    }
    #kick-table .cell-preview {
      color: #FFD700 !important;
    }

    /* ── Rename dialog ── */
    #rename-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #rename-overlay.visible { display: flex; }
    #rename-dialog {
      background: #16213e;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 320px;
    }
    #rename-msg {
      font: 15px monospace;
      color: #ccc;
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.03em;
    }
    #rename-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 9px 12px;
      font: 14px monospace;
      color: #fff;
      letter-spacing: 0.03em;
      outline: none;
      transition: border-color 0.12s;
    }
    #rename-input:focus { border-color: #3d9a5a; }
    #rename-input.invalid { border-color: #c04040; background: #2a1515; }
    #rename-input.invalid:focus { border-color: #e05555; }
    #rename-btns { display: flex; gap: 12px; }
    #btn-rename-cancel {
      font: bold 13px monospace;
      color: #aaa;
      background: #252535;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s;
    }
    #btn-rename-cancel:hover { background: #303045; }
    #btn-rename-save {
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
    }
    #btn-rename-save:hover { background: #357a52; border-color: #5abf7a; }

    /* ── Mirror confirm dialog ── */
    #mirror-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #mirror-overlay.visible { display: flex; }
    #mirror-dialog {
      background: #16213e;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      min-width: 300px;
    }
    #mirror-msg {
      font: 15px monospace;
      color: #ccc;
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.03em;
    }
    #mirror-btns { display: flex; gap: 12px; }
    #btn-mirror-cancel {
      font: bold 13px monospace;
      color: #aaa;
      background: #252535;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s;
    }
    #btn-mirror-cancel:hover { background: #303045; }
    #btn-mirror-confirm {
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
    }
    #btn-mirror-confirm:hover { background: #357a52; border-color: #5abf7a; }

    /* ── Toast ── */
    #toast {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #16213e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px 24px;
      font: 14px monospace;
      color: #ccc;
      letter-spacing: 0.03em;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.visible { display: block; }
  </style>
</head>
<body>
  <div id="page-col">

    <div class="page-header">
      <a class="back-btn" href="library_kick.html" title="킥 목록으로">
        <span class="back-arrow"></span>
        킥 목록
      </a>
      <div class="page-title-group">
        <span class="page-breadcrumb">킥 목록 / 킥 커스터마이즈</span>
        <div class="page-title-row">
          <span class="page-title">킥 커스터마이즈</span>
          <img class="kick-rename-btn" src="img/pencil.png" alt="이름 편집" title="이름 변경" id="kick-rename-btn">
        </div>
      </div>
      <button class="save-btn">저장하기</button>
    </div>

    <div class="divider"></div>

    <div id="content-area">

      <div id="editor-row">
        <div class="panel-section">
          <span class="section-title">킥 테스트</span>
          <canvas id="kick-grid"></canvas>
          <div id="kick-status-text"></div>
          <div class="panel-section">
            <span class="section-title">작업</span>
            <div class="icon-row">
              <img class="tool-icon" id="kick-action-undo" src="img/undo.png" alt="undo">
              <img class="tool-icon" id="kick-action-redo" src="img/redo.png" alt="redo">
            </div>
          </div>
          <div class="panel-section">
            <span class="section-title">도구</span>
            <div class="icon-row">
              <img class="tool-icon selected" id="kick-tool-pencil" src="img/pencil.png" alt="pencil">
              <img class="tool-icon" id="kick-tool-eraser" src="img/eraser.png" alt="eraser">
            </div>
          </div>
        </div>
        <div class="panel-section">
          <span class="section-title">대응 미노</span>
          <div id="fields-col">
          <div class="field-row">
            <input class="kick-input" type="text">
            <select class="table-select combo-select"></select>
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <div class="field-row">
            <input class="kick-input" type="text">
            <select class="table-select combo-select"></select>
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <div class="field-row">
            <input class="kick-input" type="text">
            <select class="table-select combo-select"></select>
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <div class="field-row">
            <input class="kick-input" type="text">
            <select class="table-select combo-select"></select>
            <img class="action-icon" src="img/delete.png" alt="delete">
          </div>
          <button id="add-row-btn">+ 새 행 추가</button>
        </div>
        </div>
      </div>

      <div id="combo-row">
        <div class="combo-group">
          <span class="combo-label">미노 팩</span>
          <select id="pack-select" class="combo-select"></select>
        </div>
        <div class="combo-group">
          <span class="combo-label">미노</span>
          <select id="mino-select" class="combo-select"></select>
        </div>
        <button id="add-mino-btn">추가하기</button>
      </div>

      <div id="mirror-row">
        <button class="mirror-btn" id="btn-lr-mirror">오프셋 좌우 미러링</button>
        <div class="combo-group">
          <span class="combo-label">고스트 대상</span>
          <select id="ghost-target-select" class="combo-select">
            <option value="before">Before</option>
            <option value="after" selected>After</option>
          </select>
        </div>
        <div class="combo-group">
          <span class="combo-label">고스트 형태</span>
          <select id="ghost-style-select" class="combo-select">
            <option value="border" selected>테두리</option>
            <option value="translucent">반투명</option>
          </select>
        </div>
      </div>

      <div id="table-section">
      <nav class="tab-bar" id="kick-tab-bar">
        <button class="tab active">테이블 1<span class="tab-close-btn">×</span></button>
        <button class="tab-add-btn" id="add-tab-btn" title="탭 추가">+</button>
      </nav>
      <div id="table-wrapper">
        <div id="table-col">
          <table id="kick-table">
            <thead>
              <tr>
                <th></th>
                <th>offset 0</th>
                <th>offset 1</th>
                <th>offset 2</th>
                <th>offset 3</th>
                <th>offset 4</th>
              </tr>
            </thead>
            <tbody>
              <!-- 오른쪽 회전 (CW) -->
              <tr><td>0→R</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>R→2</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>2→L</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>L→0</td><td></td><td></td><td></td><td></td><td></td></tr>
              <!-- 왼쪽 회전 (CCW) -->
              <tr><td>0→L</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>L→2</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>2→R</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>R→0</td><td></td><td></td><td></td><td></td><td></td></tr>
              <!-- 180도 회전 -->
              <tr><td>0→2</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>R→L</td><td></td><td></td><td></td><td></td><td></td></tr>
              <tr><td>2→0</td><td></td><td></td><td></td><td></td><td></td></tr>
