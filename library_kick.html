<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDROP - 킥 목록</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      height: 100vh;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 0;
      gap: 16px;
      overflow: hidden;
    }
    /* ── Page header ── */
    .page-header {
      width: 550px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font: 14px monospace;
      color: #888;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.12s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: #ccc; }
    .back-arrow {
      width: 16px;
      height: 16px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .page-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .page-breadcrumb {
      font: 12px monospace;
      color: #555;
      letter-spacing: 0.03em;
    }
    .page-title {
      font: bold 22px monospace;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .add-btn {
      margin-left: auto;
      font: bold 13px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .add-btn:hover {
      background: #357a52;
      border-color: #5abf7a;
    }
    .divider {
      width: 550px;
      height: 1px;
      background: #2a2a3e;
    }

    /* ── Card base ── */
    .card {
      background: #16213e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 18px 24px;
      width: 550px;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .card:hover {
      background: #1c2a4a;
      border-color: #666;
    }

    /* ── Active card ── */
    .card.active {
      border: 2px solid #3d9a5a;
      cursor: default;
    }
    .card.active:hover {
      background: #1a2e3a;
      border-color: #5abf7a;
    }

    /* ── Card header ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a3e;
    }
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 30px;
    }
    .status-badge {
      display: none;
      font: bold 11px monospace;
      color: #aeffcb;
      background: #2d7a4a;
      border: 1px solid #3d9a5a;
      border-radius: 4px;
      padding: 4px 10px;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card.active .status-badge {
      display: inline-block;
    }
    .card-name {
      font: bold 20px monospace;
      color: #fff;
      letter-spacing: 0.04em;
    }
    .card-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .action-icon {
      width: 26px;
      height: 26px;
      cursor: pointer;
      filter: invert(1);
      opacity: 0.6;
      transition: opacity 0.12s;
      display: block;
    }
    .action-icon:hover { opacity: 1; }

    /* ── Card body ── */
    .card-body {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .card-thumbnail {
      width: 136px;
      height: 136px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-info {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .info-row {
      font: 16px monospace;
      color: #ccc;
      letter-spacing: 0.03em;
    }
    .info-label {
      color: #888;
    }

    #kick-list {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      overflow-y: auto;
      flex: 1;
      padding-bottom: 32px;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <a class="back-btn" href="index.html" title="메인으로">
      <span class="back-arrow"></span>
      메인
    </a>
    <div class="page-title-group">
      <span class="page-breadcrumb">메인 / 킥 목록</span>
      <span class="page-title">킥 목록</span>
    </div>
    <button class="add-btn" id="import-btn">↓ 불러오기</button>
    <button class="add-btn" id="new-kick-btn">+ 새 킥 만들기</button>
  </div>

  <div class="divider"></div>

  <div id="kick-list"></div>

</body>
</html>
